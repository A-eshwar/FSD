<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>
    </head>
    <style>
        *{
            text-align:center;
            margin:0;
            padding:0;
        }
        body {
            background-image:url('login-background.jpg');
            background-size:cover;
            background-position:center;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial,sans-serif;
            color: #f5f2ea;
        }
        h1 {
            margin-top:200px;
            position:absolute;
            top:20px;
            color: #f8f1e4;
            font-size:28px;
            text-shadow:0 2px 10px rgba(0, 0, 0, 0.35);
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes pulse {
            0% {
                box-shadow:0 0 0 0 rgba(139, 69, 19);
            }
            70% {
                box-shadow:0 0 0 10px rgba(139, 69, 19);
            }
            100% {
                box-shadow:0 0 0 0 rgba(139, 69, 19);
            }
        }
        form{
            width:100%;
            max-width:400px;
            background-color: rgba(22, 30, 45);
            padding:40px 30px;
            border-radius:18px;
            box-shadow:0 14px 40px rgba(0, 0, 0);
            animation:fadeIn 0.8s ease-in-out;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        label{
            display:block;
            margin-bottom:10px;
            font-weight:bold;
            color: #f5f2ea;
            font-size:14px;
        }
        input{
            width:100%;
            padding:12px;
            margin-bottom:20px;
            border:1px solid rgba(255, 255, 255);
            border-radius:10px;
            box-sizing:border-box;
            font-size:14px;
            background-color: rgba(255, 255, 255);
            color: #1f2937;
            transition:all 0.3s ease;
        }
        input:focus {
            outline:none;
            border-color:#d9b377;
            background-color:rgba(255, 255, 255, 1);
            box-shadow:0 0 8px rgba(217, 179, 119);
        }
        button{
            background-color: #d9a84d;
            color: #1f1a12;
            padding:12px 30px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
            font-weight:bold;
            width:100%;
            transition:all 0.4s ease;
        }
        button:hover{
            background-color:#f0c97b;
            transform:translateY(-2px);
            box-shadow:0 8px 18px rgba(240, 201, 123, 0.35);
            animation:pulse 1.5s infinite;
        }
        button:active {
            transform:translateY(0);
        }
        @media screen and (max-width: 768px) {
            h1 {
                font-size: 24px;
                top: 15px;
            }

            form {
                width: 85%;
                padding: 30px 20px;
                border-radius: 12px;
            }

            button {
                padding: 10px 20px;
                font-size: 15px;
            }
        }
        @media screen and (max-width: 480px) {
            h1 {
                margin-top:250px;
                font-size:20px;
                top:10px;
            }
            form {
                width:65%;
                padding:25px 15px;
                margin-top:60px;
            }
            label {
                font-size:13px;
                margin-bottom:8px;
            }
            input {
                padding:10px;
                font-size:13px;
                margin-bottom:15px;
            }
            button {
                padding:10px 15px;
                font-size:14px;
                border-radius:6px;
            }
            button:hover{
                background-color:#f0c97b;
                transform:translateY(-2px);
                box-shadow:0 8px 18px rgba(240, 201, 123, 0.35);
                animation:pulse 1.5s infinite;
            }
        }
    </style>
    <body>
        <h1 style="text-align: center;">Student Login Page</h1>
        <form>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required><br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required><br><br>
            <button type="submit">Login</button>
        </form>
    </body>
</html>
