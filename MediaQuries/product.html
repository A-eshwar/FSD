<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Product Page</title>
    </head>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
        }
        h1{
            text-align: center;
            margin-bottom: 24px;
        }
        .card{
            display:flex;
            flex-wrap:wrap;
            justify-content: center;
            gap: 24px;
            padding: 0 24px 48px;
        }
        .product{
            background-color: white;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.12);
            flex: 1 1 220px;
            max-width: 260px;
            text-align: center;
            transition: transform 200ms ease;
        }
        .product:hover{
            transform: translateY(-6px);
        }
        .product img{
            width: 100%;
            height: 60%;
            object-fit: cover;
            border-radius:8px;
            transition: transform 300ms ease;
            display: block;
        }
        .product:hover img{
            transform: scale(1.06);
        }
        .product h2{
            margin: 12px 0 8px;
        }
        .product p{
            margin: 0 0 12px;
            font-size: 18px;
            color: #555;
        }
        .product button{
            padding:10px 20px;
            background-color: #007BFF;
            color:white;
            cursor: pointer;
            border:none;
            border-radius:10px;
            transition: background-color 220ms ease, transform 150ms ease, box-shadow 150ms ease;
        }
        .product button:hover{
            background-color: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,123,255,0.18);
        }
        @media (max-width: 700px){
            .product{ flex: 1 1 100%; max-width: 560px; }
            .product img{ height: 220px; }
        }
    </style>
    <body>
        <h1>Electronics Store</h1>
        <div class="card">
            <div class="product">
                <img src="products/camera.jpg" alt="Camera">
                <h2>Camera</h2>
                <p>Price: $2500</p>
                <button>Buy Now</button>
            </div>
            <div class="product">
                <img src="products/laptop.jpg" alt="Laptop">
                <h2>Laptop</h2>
                <p>Price: $1500</p>
                <button>Buy Now</button>
            </div> 
            <div class="product">
                <img src="products/printer.jpg" alt="Printer">
                <h2>Printer</h2>
                <p>Price: $150</p>
                <button>Buy Now</button>
            </div> 
            <div class="product">
                <img src="products/speakers.jpg" alt="Smartphone">
                <h2>Speakers</h2>
                <p>Price: $80</p>
                <button>Buy Now</button>
            </div>
            <div class="product">
                <img src="products/headphones.jpg" alt="Headphones">
                <h2>Headphones</h2>
                <p>Price: $100</p>
                <button>Buy Now</button>
             </div>
             <div class="product">
                <img src="products/earbuds.jpg" alt="Earbuds">
                <h2>Earbuds</h2>
                <p>Price: $50</p>
                <button>Buy Now</button>
             </div>
            </div>
        </div>
    </body>
</html>
