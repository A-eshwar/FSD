<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Queries</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f4f8;
      color: #333;
    }
    .page{
      min-height: 100vh;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    nav {
      width: 100%;
      max-width: 980px;
    }
    nav ul {
      list-style: none;
      padding: 10px;
      margin: 0;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      background-color: bisque;
    }
    nav ul li a {
      text-decoration: none;
      text-transform: uppercase;
      color: black;
      font-weight: 600;
    }
    .card-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
      width: 100%;
      max-width: 980px;
    }
    .card {
      display: flex;
      align-items: center;
      gap: 24px;
      background: #ffffff;
      border-radius: 18px;  
      width: 100%;
      max-width: 760px;
    }
    .card__image {
      flex: 0 0 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #e9eef5;
    }
    .card__image img {
      width: 100%;
      max-width: 180px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #ffffff;
    }
    .card__details,
    .card-body {
      padding: 24px;
    }
    .card__name {
      margin: 0 0 8px;
      font-size: 2rem;
      letter-spacing: -0.02em;
    }
    .card__branch,
    .card__email,
    .card-body h4 {
      margin: 8px 0;
      font-size: 1rem;
      color: #5f6c7b;
    }
    .card__email {
      color: #1a73e8;
      word-break: break-word;
    }
    .card-body img {
      width: 100%;
      max-width: 160px;
      border-radius: 12px;
      margin-bottom: 16px;
    }
    @media (max-width: 768px) {
      nav ul {
        flex-direction: column;
        align-items: center;
      }
      nav ul li {
        margin: 10px 0;
      }
    }
    @media (max-width: 768px) {
      .page {
        padding: 16px;
      }
      .card {
        flex-direction: column;
        text-align: center;
      }
      .card__image {
        flex: none;
        width: 100%;
        padding: 28px 24px 0;
      }
      .card__details,
      .card-body {
        padding: 20px 24px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
    <h1 style="text-align: center;">Part 1 -Exercise 2</h1>
    <div class="card-row">
      <article class="card">
        <div class="card__image">
          <img src="student1.png" alt="student image">
        </div>
        <div class="card-body">
          <h4>Student Name: Jhon</h4>
          <h4>Branch: Computer Science</h4>
          <h4>Email: john@example.com</h4>
        </div>
      </article>

      <article class="card">
        <div class="card__image">
          <img src="student2.jpg" alt="student image">
        </div>
        <div class="card-body">
          <h4>Student Name: Alice</h4>
          <h4>Branch: Computer Science</h4>
          <h4>Email: alice@example.com</h4>
        </div>
      </article>
    </div>
  </div>
</body>
</html>
