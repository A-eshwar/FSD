<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery</title>
  <style>
    .gallery{
      display: grid;
      grid-template-columns: repeat(4,100px);
      gap: 100px;
      justify-content: center;
    }
    .gallery-item{
      width: 200px;
      height: 200px;
      border-radius: 16px;
      overflow: hidden;
    }
    .gallery-item img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    h1{
      text-align: center;
      margin-bottom: 24px;
    }
    @media (max-width: 768px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
      .gallery-item {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
    }
    @media (max-width: 480px) {
      .gallery {
        grid-template-columns: 1fr;
      }
      .gallery-item{
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
    }
  </style>
</head>
<body>
  <div class="gallery">
    <div class="gallery-item"><img src="student1.png" alt="Student 1"></div>
    <div class="gallery-item"><img src="student2.jpg" alt="Student 2"></div>
    <div class="gallery-item"><img src="student3.jpg" alt="Student 3"></div>
    <div class="gallery-item"><img src="student4.jpg" alt="Student 4"></div>
    <div class="gallery-item"><img src="student5.jpg" alt="Student 5"></div>
    <div class="gallery-item"><img src="student6.jpg" alt="Student 6"></div>
    <div class="gallery-item"><img src="student7.jpg" alt="Student 7"></div>
    <div class="gallery-item"><img src="student8.jpg" alt="Student 8"></div>
  </div>
</body>
</html>
