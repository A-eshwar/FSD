<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Students Management Dashboard</title>
        <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f4f8;
            color: #333;
        }
        .site-header {
            background: transparent;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }
        .container {
            max-width: 980px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 12px;
        }
        .logo img{
            width: 110px;
            height: auto;
            display: block;
        }
        nav {
            flex: 1;
        }
        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            align-items: center;
        }
        nav ul li a {
            text-decoration: none;
            text-transform: uppercase;
            color: #222;
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 6px;
        }
        nav ul li a:hover{
            background: rgba(0,0,0,0.05);
        }
        .hero{
            max-width: 980px;
            margin: 32px auto;
            background: linear-gradient(180deg,#fff,#fafafa);
            padding: 48px 24px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 6px 18px rgba(12,20,30,0.06);
        }
        .hero h1{
            margin: 0 0 12px 0;
            font-size: 28px;
            color: #0a2540;
        }
        .hero p{
            margin: 0 0 20px 0;
            color: #334155;
        }
        .btn{
            display: inline-block;
            background: #0066cc;
            color: #fff;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: transform 180ms ease, background 180ms ease, box-shadow 180ms ease;
        }
        .btn:hover{ 
            transform: translateY(-3px); 
            box-shadow: 0 8px 20px rgba(0,102,204,0.18);
        } 
        .features{
            max-width: 980px;
            margin: 28px auto;
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 16px;
            padding: 0 12px 48px 12px;
        }
        .feature{
            background: #fff;
            padding: 18px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 12px rgba(12,20,30,0.06);
        }
        .feature h3{ 
            margin: 8px 0; 
        }
        .feature p{ 
            margin: 0; 
            color: #475569; 
        }
        footer{
            max-width: 980px;
            margin: 0 auto 40px auto;
            padding: 18px 12px;
            color: #64748b;
            text-align: center;
        }
        .fade-in{ 
            animation: fadeIn 700ms ease both; 
        }
        .feature.fade-in{ 
            animation-duration: 900ms; 
        }
        @keyframes fadeIn{ 
            from{ 
                opacity: 0; 
                transform: translateY(8px);
            } 
            to{ 
                opacity: 1; 
                transform: translateY(0);
            } 
        }
        @media (max-width: 768px){
            .container{ 
                flex-direction: column; 
                align-items: center; 
                gap: 12px; 
            }
            nav ul{ 
                justify-content: 
                center; 
            }
            .hero{ 
                padding: 28px 14px; 
            }
            .features{ 
                grid-template-columns: 1fr; 
                padding-bottom: 24px; 
            }
        }
        @media (max-width: 420px){
            .hero h1{ font-size: 22px; }
            .logo img{ width: 90px; }
        }
        </style>
    </head>
    <body>
        <header class="site-header">
            <div class="container">
                <div class="logo">
                    <img src="logo.jpg" alt="College Logo">
                </div>
                <nav>
                    <ul>
                        <li><a href="st_management_sys.html">Home</a></li>
                        <li><a href="about.html">About</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                </nav>
            </div>
        </header>

        <section class="hero fade-in">
            <h1>Welcome to the College Student Portal</h1>
            <a class="btn" href="register.html">Register Now</a>
        </section>

        <section class="features">
            <div class="feature fade-in">
                <img src="reg.jpg" alt="" style="height:48px;opacity:.6">
                <h3>Student Registration</h3>
            </div>
            <div class="feature fade-in">
                <img src="attendance.jpg" style="height:48px;opacity:.6">
                <h3>Attendance</h3>
            </div>
            <div class="feature fade-in">
                <img src="results.jpg" alt="" style="height:48px;opacity:.6">
                <h3>Results</h3>
            </div>
        </section>

        <footer>
            &copy; 2026 College Name. All rights reserved.
        </footer>
    </body>
</html>
    </body>
</html>
