<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Transitions</title>
        <style>
            *{
                box-sizing: border-box;
            }
            /*part2 Exercise 5*/
            #button{
                padding:12px 24px;
                font-size:16px;
                background-color:blue;
                color:white;
                border:none;
            }
            #button:hover{
                background-color:green;
                transition:all 0.5s ease;
                transform:scale(1.1 );
            }
            /*part2 Exercise 6*/
            .card{
                width:200px;
                height:200px;
                background-color:yellow;
                border-radius:16px;
                transition:all 0.5s ease;
                text-align: center;
            }
            .card:hover{
                background-color:orange;
                width:250px;
                height:250px;
            }
            /*part2 Exercise 7*/
            nav{
                background-color:lightgray;
                padding:12px 24px;
            }
            nav ul{
                list-style:none;
                display:flex;
                gap:16px;
                padding:0;
                margin:0;
            }
            nav ul li a{
                text-decoration:none;
                color:black;
                font-weight:600;
                position:relative;
                transition:all 1s ease;
            }
            nav ul li a:hover{
                color:blue;
                font-size:18px;
                text-decoration:underline;
            }
            /*part2 Exercise 8*/
            .card img{
                width:100%;
                height:100%;
                object-fit:cover;
                transition:all 0.5s ease;
            }
            .card img:hover{
                transform:scale(1.2);
            }
        </style>
    </head>
    <body>
        <button id="button">Hello</button>
        <hr>
        <h2>Part 2: Exercise 6: Expanding card</h2>
        <div class="card">
            <h2>Hover me</h2>
        </div>    
        <hr>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
        <hr>
        <div class="card">
            <img src="student1.png" alt="Student 1">
        </div>
    </body>
</html>
